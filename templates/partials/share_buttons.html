<div class="flex items-center gap-2" x-data="{ copie:false }">
  <span class="text-sm font-semibold text-ensoleille-gris mr-1">Partager :</span>
  <a target="_blank" rel="noopener" href="https://www.facebook.com/sharer/sharer.php?u={{ url_complete|urlencode }}" class="h-9 w-9 inline-flex items-center justify-center rounded-full bg-[#1877F2] text-white hover:opacity-90" aria-label="Facebook"><svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M22 12a10 10 0 10-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.2c-1.2 0-1.6.8-1.6 1.6V12h2.7l-.4 2.9h-2.3v7A10 10 0 0022 12z"/></svg></a>
  <a target="_blank" rel="noopener" href="https://wa.me/?text={{ titre|urlencode }}%20{{ url_complete|urlencode }}" class="h-9 w-9 inline-flex items-center justify-center rounded-full bg-[#25D366] text-white hover:opacity-90" aria-label="WhatsApp"><svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2a10 10 0 00-8.5 15.2L2 22l4.9-1.3A10 10 0 1012 2zm0 18a8 8 0 01-4.1-1.1l-.3-.2-2.9.8.8-2.8-.2-.3A8 8 0 1112 20zm4.4-6c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.5 6.5 0 01-3.2-2.8c-.2-.4.2-.4.6-1.2.1-.1 0-.3 0-.4l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5c-.2 0-.4.1-.6.3-.7.7-1 1.6-.9 2.6.2 1.2 1 2.4 1.1 2.6.1.2 2 3 4.7 4.1 1.7.7 2.3.8 3.1.7.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1l-.4-.2z"/></svg></a>
  <a target="_blank" rel="noopener" href="https://twitter.com/intent/tweet?text={{ titre|urlencode }}&url={{ url_complete|urlencode }}" class="h-9 w-9 inline-flex items-center justify-center rounded-full bg-black text-white hover:opacity-90" aria-label="X"><svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path d="M18.9 2H22l-7 8 8.3 11h-6.5l-5-6.6L6 21H2.9l7.5-8.6L2.4 2h6.6l4.6 6.1L18.9 2z"/></svg></a>
  <button @click="navigator.clipboard.writeText('{{ url_complete }}'); copie=true; setTimeout(()=>copie=false,2000)" class="h-9 w-9 inline-flex items-center justify-center rounded-full bg-ensoleille-noir text-ensoleille-creme hover:bg-ensoleille-noir2" aria-label="Copier le lien">
    <svg x-show="!copie" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 007 0l3-3a5 5 0 00-7-7l-1 1M14 11a5 5 0 00-7 0l-3 3a5 5 0 007 7l1-1"/></svg>
    <svg x-show="copie" x-cloak class="h-4 w-4 text-ensoleille-jaune" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
  </button>
</div>
