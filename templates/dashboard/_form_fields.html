{% for field in form %}
<div class="{% if field.name in 'a_la_une urgent epingle actif en_menu auto_ads' %}flex items-center gap-2{% else %}flex flex-col{% endif %}">
  {% if field.name in 'a_la_une urgent epingle actif en_menu auto_ads' %}
    {{ field }}
    <label for="{{ field.id_for_label }}" class="text-sm font-medium">{{ field.label }}</label>
  {% else %}
    <label for="{{ field.id_for_label }}" class="text-sm font-medium mb-1">{{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}</label>
    {{ field }}
  {% endif %}
  {% if field.help_text %}<p class="text-xs text-ensoleille-gris mt-1">{{ field.help_text|safe }}</p>{% endif %}
  {% for e in field.errors %}<p class="text-xs text-red-500 mt-1">{{ e }}</p>{% endfor %}
</div>
{% endfor %}
