{% extends "dashboard/base_dashboard.html" %}
{% load icons %}
{% block page_title %}Paramètres du site{% endblock %}
{% block content %}
<form method="post" enctype="multipart/form-data" class="max-w-3xl bg-white rounded-xl border border-ensoleille-bordure p-6">
  {% csrf_token %}
  <div class="flex items-center gap-2 pb-3 mb-4 border-b border-ensoleille-bordure">
    {% icon "gear" "h-5 w-5 text-ensoleille-or" %}
    <h2 class="font-titre font-bold">Paramètres du site</h2>
  </div>
  <div class="grid sm:grid-cols-2 gap-4">
    {% include "dashboard/_form_fields.html" %}
  </div>
  <div class="flex gap-2 pt-5">
    <button class="inline-flex items-center gap-2 rounded-lg bg-ensoleille-or px-6 py-2.5 font-semibold text-ensoleille-noir hover:bg-ensoleille-ambre">{% icon "save" "h-5 w-5" %}Enregistrer</button>
  </div>
</form>
{% endblock %}
